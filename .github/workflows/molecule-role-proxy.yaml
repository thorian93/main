# https://github.com/ansible-collections/collection_template/blob/main/.github/workflows/ansible-test.yml

permissions:
  contents: read

name: Molecule Test Proxy
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'roles/proxy/**'
      - '.github/workflows/_template-molecule-test.yaml'
      - '.github/workflows/molecule-role-proxy.yaml'
  push:
    paths:
      - 'roles/proxy/**'
      - '.github/workflows/_template-molecule-test.yaml'
      - '.github/workflows/molecule-role-proxy.yaml'

jobs:
  integration:
    name: "Molecule"
    uses: ./.github/workflows/_template-molecule-test.yaml
    with:
      role: proxy
